name: Compare Clang Flags Arch AUR Android Target
on: [push, workflow_dispatch]
jobs:
  compare:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - run: pacman -Syu --noconfirm base-devel git sudo wget tar xz
      - run: |
          useradd -m -G wheel builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
      - run: su - builder -c "git clone https://aur.archlinux.org/android-ndk.git /tmp/android-ndk"
      - run: su - builder -c "cd /tmp/android-ndk && makepkg -si --noconfirm"
      - run: touch dummy.c
      - run: /opt/android-ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android34-clang -### -c dummy.c 2>&1
      - run: |
          wget -qO llvm.tar.xz https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.1/LLVM-22.1.1-Linux-X64.tar.xz
          tar -xf llvm.tar.xz
          ./LLVM-22.1.1-Linux-X64/bin/clang --target=aarch64-linux-android34 -### -c dummy.c 2>&1
