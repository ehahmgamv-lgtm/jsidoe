name: Compare LLVM 21 vs 22 Minimal
on: [push, workflow_dispatch]
jobs:
  compare:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - run: pacman -Syu --noconfirm wget tar xz diffutils
      - run: |
          echo 'void bench(double* a, double* b, double* c, int n) {
            for(int i=0; i<n; i++) {
              c[i] = a[i] * b[i] + a[i];
            }
          }' > dummy.c
      - run: |
          wget -qO llvm21.tar.xz https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.8/LLVM-21.1.8-Linux-X64.tar.xz
          tar -xf llvm21.tar.xz
          ./LLVM-21.1.8-Linux-X64/bin/clang -O3 -S dummy.c -o llvm21.s
      - run: |
          wget -qO llvm22.tar.xz https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.1/LLVM-22.1.1-Linux-X64.tar.xz
          tar -xf llvm22.tar.xz
          ./LLVM-22.1.1-Linux-X64/bin/clang -O3 -S dummy.c -o llvm22.s
      - run: diff -u llvm21.s llvm22.s || true
      - uses: actions/upload-artifact@v4
        with:
          name: asm-min
          path: |
            llvm21.s
            llvm22.s
